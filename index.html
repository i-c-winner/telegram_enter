<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Telegram Login Widget</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
    }

    .card {
      width: min(92vw, 460px);
      padding: 24px;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    .hint {
      margin: 0 0 16px;
      color: #475569;
      font-size: 14px;
    }

    .result {
      margin-top: 16px;
      padding: 10px 12px;
      border-radius: 10px;
      background: #eef4ff;
      color: #1e3a8a;
    }

    .error {
      margin-top: 12px;
      color: #b91c1c;
      font-size: 13px;
    }

    .logout-btn {
      margin-top: 12px;
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      background: #dc2626;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
    }

    .logout-btn[hidden] {
      display: none;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Telegram Login Widget</h1>
    <p class="hint">После входа появится ваш Telegram ID.</p>

    <div id="tg-widget"></div>

    <div id="result" class="result">Telegram ID: -</div>
    <button id="logout-btn" class="logout-btn" type="button" hidden>Разлогиниться</button>
    <div id="error" class="error"></div>
  </main>

  <script>
    var BOT_USERNAME = "Yoga_T_bot";
    var STORAGE_KEY = "telegram_user";

    function setAuthState(user) {
      document.getElementById("result").textContent = "Telegram ID: " + user.id;
      document.getElementById("logout-btn").hidden = false;
    }

    function clearAuthState() {
      document.getElementById("result").textContent = "Telegram ID: -";
      document.getElementById("logout-btn").hidden = true;
    }

    function onTelegramAuth(user) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(user));
      setAuthState(user);
      document.getElementById("error").textContent = "";
    }

    function logout() {
      localStorage.removeItem(STORAGE_KEY);
      clearAuthState();
      location.reload();
    }

    function renderTelegramWidget() {
      var container = document.getElementById("tg-widget");
      var script = document.createElement("script");
      script.async = true;
      script.src = "https://telegram.org/js/telegram-widget.js?22";
      script.setAttribute("data-telegram-login", BOT_USERNAME);
      script.setAttribute("data-size", "large");
      script.setAttribute("data-userpic", "false");
      script.setAttribute("data-request-access", "write");
      script.setAttribute("data-onauth", "onTelegramAuth(user)");
      script.onerror = function () {
        document.getElementById("error").textContent =
          "Не удалось загрузить Telegram Widget. Отключи блокировщик рекламы/трекеров для сайта и перезагрузи страницу.";
      };
      container.appendChild(script);

      setTimeout(function () {
        var hasWidget = container.querySelector("iframe") || container.querySelector("span");
        if (!hasWidget && window.location.protocol !== "file:") {
          document.getElementById("error").textContent =
            "Кнопка Telegram не появилась. Проверь: 1) BOT username верный, 2) /setdomain в BotFather = текущий домен, 3) блокировщик в браузере отключен.";
        }
      }, 2500);
    }

    if (window.location.protocol === "file:") {
      document.getElementById("error").textContent =
        "Открыто через file://. Для работы Telegram Login Widget открой страницу по https:// домену и укажи data-telegram-login с username бота.";
    } else {
      document.getElementById("logout-btn").addEventListener("click", logout);
      try {
        var saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          setAuthState(JSON.parse(saved));
        } else {
          clearAuthState();
        }
      } catch (e) {
        clearAuthState();
      }
      renderTelegramWidget();
    }
  </script>
</body>
</html>
