<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://telegram.org; frame-src https://oauth.telegram.org https://telegram.org; connect-src 'self' https://telegram.org https://oauth.telegram.org; img-src 'self' data: https://telegram.org https://oauth.telegram.org; style-src 'self' 'unsafe-inline';"
  />
  <title>Telegram Login Widget</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
    }

    .card {
      width: min(92vw, 460px);
      padding: 24px;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    .hint {
      margin: 0 0 16px;
      color: #475569;
      font-size: 14px;
    }

    .result {
      margin-top: 16px;
      padding: 10px 12px;
      border-radius: 10px;
      background: #eef4ff;
      color: #1e3a8a;
    }

    .error {
      margin-top: 12px;
      color: #b91c1c;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Telegram Login Widget</h1>
    <p class="hint">После входа появится ваш Telegram ID.</p>

    <div id="tg-widget"></div>

    <div id="result" class="result">Telegram ID: -</div>
    <div id="error" class="error"></div>
  </main>

  <script>
    var BOT_USERNAME = "Yoga_T_bot";

    function onTelegramAuth(user) {
      document.getElementById("result").textContent = "Telegram ID: " + user.id;
      document.getElementById("error").textContent = "";
    }

    function renderTelegramWidget() {
      var container = document.getElementById("tg-widget");
      var script = document.createElement("script");
      script.async = true;
      script.src = "https://telegram.org/js/telegram-widget.js?22";
      script.setAttribute("data-telegram-login", BOT_USERNAME);
      script.setAttribute("data-size", "large");
      script.setAttribute("data-userpic", "false");
      script.setAttribute("data-request-access", "write");
      script.setAttribute("data-onauth", "onTelegramAuth(user)");
      script.onerror = function () {
        document.getElementById("error").textContent =
          "Не удалось загрузить Telegram Widget. Отключи блокировщик рекламы/трекеров для сайта и перезагрузи страницу.";
      };
      container.appendChild(script);

      setTimeout(function () {
        var hasWidget = container.querySelector("iframe") || container.querySelector("span");
        if (!hasWidget && window.location.protocol !== "file:") {
          document.getElementById("error").textContent =
            "Кнопка Telegram не появилась. Проверь: 1) BOT username верный, 2) /setdomain в BotFather = текущий домен, 3) блокировщик в браузере отключен.";
        }
      }, 2500);
    }

    if (window.location.protocol === "file:") {
      document.getElementById("error").textContent =
        "Открыто через file://. Для работы Telegram Login Widget открой страницу по https:// домену и укажи data-telegram-login с username бота.";
    } else {
      renderTelegramWidget();
    }
  </script>
</body>
</html>
