<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Click Payment Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      :root {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        background: linear-gradient(150deg, #edf7ff, #fff7e9);
        color: #111827;
      }
      .card {
        width: min(92vw, 480px);
        background: #fff;
        border-radius: 20px;
        padding: 22px;
        box-shadow: 0 18px 40px rgba(16, 24, 40, 0.12);
      }
      h1 {
        margin: 0;
        font-size: 28px;
      }
      .muted {
        margin-top: 8px;
        color: #667085;
        font-size: 15px;
      }
      .plan-row {
        margin-top: 16px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .plan-btn {
        border: 1px solid #d0d5dd;
        background: #fff;
        border-radius: 12px;
        padding: 12px;
        cursor: pointer;
        font-size: 15px;
      }
      .plan-btn.active {
        border-color: #1769ff;
        background: #eef4ff;
      }
      .pay-btn {
        margin-top: 14px;
        width: 100%;
        border: 0;
        border-radius: 12px;
        background: #1769ff;
        color: #fff;
        font-size: 16px;
        padding: 12px;
        cursor: pointer;
      }
      .hint {
        margin-top: 12px;
        font-size: 13px;
        color: #475467;
      }
      code {
        background: #f2f4f7;
        border-radius: 6px;
        padding: 1px 6px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1 id="title">Привет!</h1>
      <p class="muted" id="subtitle">Выберите тариф и перейдите на внешний сервер оплаты Click.</p>

      <div class="plan-row">
        <button class="plan-btn active" id="plan-1m" data-plan="1m">1 месяц</button>
        <button class="plan-btn" id="plan-6m" data-plan="6m">6 месяцев</button>
      </div>

      <button class="pay-btn" id="pay-btn">Оплатить через Click</button>

      <p class="hint" id="hint">
        Базовый URL оплаты задаётся через query-параметр
        <code>paymentBase</code>, например:
        <code>?paymentBase=https://pay.example.com/click/start</code>
      </p>
    </main>

    <script>
      const tg = window.Telegram?.WebApp;
      if (tg) {
        tg.ready();
      }

      const state = { plan: '1m' };

      const plan1 = document.getElementById('plan-1m');
      const plan6 = document.getElementById('plan-6m');
      const payBtn = document.getElementById('pay-btn');

      function setPlan(plan) {
        state.plan = plan;
        plan1.classList.toggle('active', plan === '1m');
        plan6.classList.toggle('active', plan === '6m');
      }

      plan1.addEventListener('click', () => setPlan('1m'));
      plan6.addEventListener('click', () => setPlan('6m'));

      function resolveLang() {
        const url = new URL(window.location.href);
        const fromQuery = (url.searchParams.get('lang') || '').toLowerCase();
        if (fromQuery === 'uz' || fromQuery === 'kz' || fromQuery === 'ru') {
          return fromQuery;
        }

        const tgLang = (tg?.initDataUnsafe?.user?.language_code || 'ru').toLowerCase();
        if (tgLang.startsWith('uz')) return 'uz';
        if (tgLang.startsWith('kk') || tgLang.startsWith('kz')) return 'kz';
        return 'ru';
      }

      function applyLocale() {
        const lang = resolveLang();
        const title = document.getElementById('title');
        const subtitle = document.getElementById('subtitle');

        const dict = {
          ru: {
            title: 'Привет!',
            subtitle: 'Выберите тариф и перейдите на внешний сервер оплаты Click.',
            p1: '1 месяц',
            p6: '6 месяцев',
            pay: 'Оплатить через Click'
          },
          uz: {
            title: 'Salom!',
            subtitle: 'Tarifni tanlang va Click to\'lovi uchun tashqi serverga o\'ting.',
            p1: '1 oy',
            p6: '6 oy',
            pay: 'Click orqali to\'lash'
          },
          kz: {
            title: 'Сәлем!',
            subtitle: 'Тарифті таңдап, Click төлемі үшін сыртқы серверге өтіңіз.',
            p1: '1 ай',
            p6: '6 ай',
            pay: 'Click арқылы төлеу'
          }
        };

        title.textContent = dict[lang].title;
        subtitle.textContent = dict[lang].subtitle;
        plan1.textContent = dict[lang].p1;
        plan6.textContent = dict[lang].p6;
        payBtn.textContent = dict[lang].pay;
      }

      function getPaymentBase() {
        const url = new URL(window.location.href);
        return url.searchParams.get('paymentBase') || '';
      }

      function buildPaymentUrl(baseUrl) {
        const user = tg?.initDataUnsafe?.user;
        const url = new URL(baseUrl);

        if (user?.id) url.searchParams.set('telegramUserId', String(user.id));
        if (user?.username) url.searchParams.set('username', user.username);
        url.searchParams.set('plan', state.plan);
        url.searchParams.set('source', 'telegram-miniapp');
        url.searchParams.set('lang', resolveLang());

        return url.toString();
      }

      payBtn.addEventListener('click', () => {
        const paymentBase = getPaymentBase();

        if (!paymentBase) {
          alert('Не задан paymentBase в URL Mini App.');
          return;
        }

        let target;
        try {
          target = buildPaymentUrl(paymentBase);
        } catch {
          alert('Некорректный paymentBase URL.');
          return;
        }

        if (tg?.openLink) {
          tg.openLink(target);
        } else {
          window.open(target, '_blank', 'noopener,noreferrer');
        }
      });

      applyLocale();
    </script>
  </body>
</html>
